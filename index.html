
<!DOCTYPE html>
<html lang="en" class="antialiased">

    <meta charset="UTF-8" />

    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='120' fill='url(%23g)'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23F97316'/%3E%3Cstop offset='100%25' stop-color='%23E11D48'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M130 360L130 160L256 280L382 160L382 360' stroke='white' stroke-width='40' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Battambang:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['var(--font-family)', 'sans-serif'],
            },
            borderRadius: {
                'xl': 'var(--radius-md)',
                '2xl': 'var(--radius-lg)',
                '3xl': 'var(--radius-xl)',
                'full': '9999px',
            },
            colors: {
              primary: {
                DEFAULT: 'rgb(var(--color-primary) / <alpha-value>)',
                50: 'rgb(var(--color-primary) / 0.05)',
                100: 'rgb(var(--color-primary) / 0.1)',
                200: 'rgb(var(--color-primary) / 0.2)',
                300: 'rgb(var(--color-primary) / 0.3)',
                400: 'rgb(var(--color-primary) / 0.5)',
                500: 'rgb(var(--color-primary) / 0.7)',
                600: 'rgb(var(--color-primary) / 0.8)',
                700: 'rgb(var(--color-primary) / 0.9)',
                800: 'rgb(var(--color-primary) / 0.95)',
                900: 'rgb(var(--color-primary) / 1)',
              },
              dark: {
                bg: '#0F172A',
                card: '#1E293B',
                input: '#334155'
              }
            },
            boxShadow: {
              'pill': '0 4px 20px -2px rgba(0, 0, 0, 0.1), 0 2px 10px -2px rgba(0, 0, 0, 0.05)',
              'glow': '0 0 25px rgb(var(--color-primary) / 0.4)',
              'glass': 'var(--shadow-glass)',
              'neumorph': '20px 20px 60px #d1d5db, -20px -20px 60px #ffffff',
              'neumorph-dark': '10px 10px 20px #0d1321, -10px -10px 20px #111b33',
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float-slow': 'float 10s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.5s ease-out forwards',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'check-flourish': 'checkFlourish 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              checkFlourish: {
                '0%': { transform: 'scale(0.3) rotate(-20deg)', opacity: '0' },
                '60%': { transform: 'scale(1.2) rotate(10deg)', opacity: '1' },
                '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
              }
            },
            padding: {
              'safe': 'env(safe-area-inset-bottom)',
              'safe-top': 'env(safe-area-inset-top)'
            }
          }
        }
      }
      
      // Check for dark mode preference
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }
    </script>
    <style>
      :root {
        /* Default Theme Variables */
        --color-primary: 249 115 22; /* Orange 500 */
        --font-family: 'Outfit', sans-serif;
        
        /* Dynamic Styling Variables */
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
        --radius-xl: 1.5rem;
        --shadow-glass: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
      }

      /* Hide scrollbar but keep functionality */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      
      body {
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        background: transparent; /* Force transparency for live backgrounds */
      }
      
      /* Glassmorphism utilities */
      .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .glass {
        background: rgba(30, 41, 59, 0.7);
      }
      
      /* Loading Spinner */
      #loading-spinner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        border: 4px solid rgba(249, 115, 22, 0.1);
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border-left-color: #F97316;
        animation: spin 1s linear infinite;
        z-index: 9999;
      }
      @keyframes spin { 0% { transform: translate(-50%, -50%) rotate(0deg); } 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",

    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.4.1",
    "@neondatabase/serverless": "https://cdn.jsdelivr.net/npm/@neondatabase/serverless@0.9.0/+esm",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>

</head>

    <div id="root">
      <div id="loading-spinner"></div>
    </div>

</html>
